services:
  hcm-mock:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install --silent && npm run start:mock"
    environment:
      HCM_MOCK_PORT: "3100"
    ports:
      - "3100:3100"

  timeoff:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install --silent && npm run start:dev"
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_PATH: data/timeoff.sqlite
      DATABASE_SYNCHRONIZE: "true"
      JWT_SECRET: change-me-in-prod-please
      HCM_BASE_URL: http://hcm-mock:3100
      HCM_TIMEOUT_MS: "5000"
      HCM_BATCH_INGEST_SECRET: batch-ingest-shared-secret
    depends_on:
      - hcm-mock
    ports:
      - "3000:3000"